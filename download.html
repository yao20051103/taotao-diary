<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FF6B8A">
    <title>桃桃日记 - 下载安装</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(180deg, #FFF5F5 0%, #FFE8E8 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(255, 107, 138, 0.2);
            text-align: center;
        }
        .app-icon {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            margin: 0 auto 20px;
            object-fit: cover;
        }
        h1 {
            color: #FF6B8A;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .version {
            color: #999;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .description {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .download-section {
            margin-bottom: 20px;
        }
        .download-btn {
            display: block;
            width: 100%;
            padding: 15px 20px;
            background: linear-gradient(135deg, #FF6B8A 0%, #FF8E9B 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 107, 138, 0.4);
        }
        .download-btn:active {
            transform: translateY(0);
        }
        .install-hint {
            background: #FFF5F5;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            text-align: left;
        }
        .install-hint h3 {
            color: #FF6B8A;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .install-hint ol {
            color: #666;
            font-size: 12px;
            line-height: 1.8;
            padding-left: 20px;
        }
        .qr-section {
            margin: 20px 0;
        }
        .qr-code {
            width: 150px;
            height: 150px;
            margin: 10px auto;
            display: block;
        }
        .qr-hint {
            color: #999;
            font-size: 12px;
        }
        .divider {
            height: 1px;
            background: #EEE;
            margin: 20px 0;
        }
        .web-version-link {
            display: inline-block;
            color: #FF6B8A;
            font-size: 13px;
            margin-top: 15px;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="新建文件夹/icom.page.jpg" alt="App Icon" class="app-icon">
        <h1>桃桃日记</h1>
        <p class="version">版本 1.0.0</p>
        
        <p class="description">
            一款温馨的日记应用，记录每一天的小美好。<br>
            点击下方按钮下载并安装到您的手机。
        </p>

        <div class="download-section">
            <a href="https://github.com/YOUR_USERNAME/YOUR_REPO/releases/latest/download/taotao-diary.apk" class="download-btn" id="downloadBtn" target="_blank">
                📱 下载安装包 (APK)
            </a>
            <a href="新建文件夹/diary_system.html" class="download-btn" style="background: linear-gradient(135deg, #4CAF50 0%, #66BB6A 100%);">
                🌐 打开网页版
            </a>
        </div>

        <div class="qr-section">
            <p style="color: #666; font-size: 13px; margin-bottom: 10px;">扫码下载（微信/支付宝扫描）</p>
            <img src="新建文件夹/qrcode.png" alt="QR Code" class="qr-code" id="qrCode" onerror="this.style.display='none'">
            <p class="qr-hint" id="qrHint">请先配置二维码图片</p>
        </div>

        <div class="divider"></div>

        <div class="install-hint">
            <h3>📋 安装说明</h3>
            <ol>
                <li>点击「下载安装包」按钮下载 APK</li>
                <li>下载完成后，点击打开文件</li>
                <li>如果提示「禁止安装」，请开启权限：<br>
                    设置 → 安全 → 开启「未知来源」</li>
                <li>安装完成后即可使用</li>
            </ol>
        </div>
        
        <a href="新建文件夹/diary_system.html" class="web-version-link">→ 继续使用网页版</a>
    </div>

    <script>
        // GitHub Pages 路径处理
        document.addEventListener('DOMContentLoaded', function() {
            // 动态获取当前仓库的下载链接
            const repo = window.location.pathname.replace(/\/download\.html$/, '');
            const baseUrl = window.location.origin + repo;
            
            // 更新下载链接
            const downloadBtn = document.getElementById('downloadBtn');
            if (downloadBtn) {
                downloadBtn.href = baseUrl + '/新建文件夹/taotao-diary.apk';
            }
            
            // 检查二维码是否存在
            const qrCode = document.getElementById('qrCode');
            const qrHint = document.getElementById('qrHint');
            if (qrCode && qrHint) {
                qrCode.onerror = function() {
                    qrHint.textContent = '请先配置二维码图片';
                };
            }
        });
    </script>
</body>
</html>
