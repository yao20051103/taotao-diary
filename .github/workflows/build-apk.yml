name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create project directory
        run: |
          mkdir -p taotao-diary-app

      - name: Initialize npm project
        run: |
          cd taotao-diary-app
          npm init -y
          
      - name: Install Capacitor
        run: |
          cd taotao-diary-app
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Copy source files
        run: |
          mkdir -p taotao-diary-app/src
          find . -name "diary_system.html" -exec cp {} taotao-diary-app/src/ \;
          find . -name "manifest.json" -exec cp {} taotao-diary-app/src/ \;
          find . -name "service-worker.js" -exec cp {} taotao-diary-app/src/ \;
          find . -name "icom.page.jpg" -exec cp {} taotao-diary-app/src/ \;
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0;url=diary_system.html"></head></html>' > taotao-diary-app/src/index.html

      - name: Initialize Capacitor
        run: |
          cd taotao-diary-app
          npx cap init "桃桃日记" "com.taotao.diary" --web-dir=src

      - name: Add Android platform
        run: |
          cd taotao-diary-app
          npx cap add android

      - name: Configure Gradle for Java 21
        run: |
          cd taotao-diary-app/android
          mkdir -p gradle
          echo 'org.gradle.java.home=/usr/lib/jvm/temurin-21-amd64' >> gradle.properties

      - name: Sync Capacitor
        run: |
          cd taotao-diary-app
          npx cap sync android

      - name: Build APK
        run: |
          cd taotao-diary-app/android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: taotao-diary-apk
          path: taotao-diary-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main'
        with:
          files: taotao-diary-app/android/app/build/outputs/apk/debug/app-debug.apk
          body: |
            # 桃桃日记 APK
            
            📱 **版本**: 1.0.0
            
            ## 下载说明
            1. 点击上方 `app-debug.apk` 下载
            2. 传输到手机
            3. 安装（开启"未知来源"权限）
            
            ## 二维码下载
            请访问: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/download.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
