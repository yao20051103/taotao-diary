name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3

      - name: Setup project
        run: |
          mkdir -p src
          cp diary_system.html src/
          cp manifest.json src/
          cp service-worker.js src/
          cp icom.page.jpg src/
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0;url=diary_system.html"></head></html>' > src/index.html
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Clean Gradle Cache
        run: |
          rm -rf ~/.gradle/caches/
          mkdir -p ~/.gradle/caches/

      - name: Build APK
        run: |
          npx cap init "桃桃日记" "com.taotao.diary" --web-dir="src"
          npx cap add android
          npx cap sync android
          cd android
          chmod +x ./gradlew
          # 使用 --no-daemon 避免守护进程问题
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: taotao-diary-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main'
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          body: |
            # 桃桃日记 APK
            
            📱 **版本**: 1.0.0
            
            ## 下载说明
            1. 点击上方 `taotao-diary.apk` 下载
            2. 传输到手机
            3. 安装（开启"未知来源"权限）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
